<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 실거래가 비교</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f1a; color: #e2e8f0; font-family: 'Malgun Gothic', sans-serif; font-size: 14px; }

header { background: linear-gradient(135deg,#1a1a3e,#0f0f1a); border-bottom: 1px solid #2d2d5e; padding: 16px; }
header h1 { font-size: 18px; font-weight: 800; color: #a78bfa; }
header p { font-size: 11px; color: #64748b; margin-top: 2px; }
.count-badge { display: inline-block; background: #2d2d5e; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #a78bfa; font-weight: 700; margin-top: 6px; }

.filters { background: #13131f; border-bottom: 1px solid #1e1e3a; padding: 14px 16px; }
.filter-group { margin-bottom: 12px; }
.filter-label { font-size: 10px; color: #64748b; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
.btn-row { display: flex; flex-wrap: wrap; gap: 6px; }
.btn { border: 1px solid #2d2d5e; border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-weight: 600; background: #1e1e3a; color: #64748b; font-family: inherit; transition: all 0.15s; }
.btn.active        { background: #a78bfa33; border-color: #a78bfa; color: #a78bfa; }
.btn.active-blue   { background: #3B82F633; border-color: #3B82F6; color: #3B82F6; }
.btn.active-green  { background: #10B98133; border-color: #10B981; color: #10B981; }
.btn.active-yellow { background: #F59E0B33; border-color: #F59E0B; color: #F59E0B; }
.btn.active-red    { background: #EF444433; border-color: #EF4444; color: #EF4444; }
.btn.active-purple { background: #8B5CF633; border-color: #8B5CF6; color: #8B5CF6; }

.date-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
input[type=date] { background: #1e1e3a; border: 1px solid #2d2d5e; border-radius: 6px; color: #e2e8f0; padding: 5px 8px; font-size: 12px; outline: none; font-family: inherit; }

.tabs { display: flex; border-bottom: 1px solid #1e1e3a; background: #13131f; }
.tab { flex: 1; text-align: center; padding: 11px 4px; font-size: 12px; cursor: pointer; font-weight: 700; color: #64748b; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
.tab.active { color: #a78bfa; border-bottom-color: #a78bfa; }

.content { padding: 16px; }
.panel { display: none; }
.panel.active { display: block; }

/* 차트 */
.chart-box { background: #13131f; border-radius: 12px; padding: 16px 8px 12px; border: 1px solid #1e1e3a; position: relative; cursor: pointer; }
.chart-title { font-size: 12px; color: #94a3b8; margin-bottom: 12px; padding-left: 8px; }
canvas { max-height: 320px; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; padding-left: 8px; margin-top: 10px; }
.legend-item { font-size: 11px; color: #94a3b8; }
.expand-btn { position: absolute; top: 10px; right: 10px; background: #2d2d5e; border: none; border-radius: 8px; color: #a78bfa; font-size: 16px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; }
.expand-hint { text-align: center; color: #4a4a6a; font-size: 11px; margin-top: 8px; }

/* 전체화면 모달 */
#chartModal { display: none; position: fixed; inset: 0; background: #0a0a14; z-index: 9999; flex-direction: column; }
#chartModal.open { display: flex; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #2d2d5e; background: #13131f; flex-shrink: 0; }
.modal-title { font-size: 14px; font-weight: 700; color: #a78bfa; }
.close-btn { background: #2d2d5e; border: none; border-radius: 8px; color: #e2e8f0; font-size: 20px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; }
.modal-body { flex: 1; padding: 16px 8px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
#modalChart { flex: 1; min-height: 0; width: 100%; }
.modal-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; flex-shrink: 0; padding-left: 8px; }
.modal-legend span { font-size: 11px; color: #94a3b8; }

/* 표 */
.overflow { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { padding: 10px; text-align: right; color: #94a3b8; font-weight: 700; font-size: 11px; background: #1e1e3a; white-space: nowrap; }
th:first-child { text-align: left; }
td { padding: 9px 10px; border-bottom: 1px solid #1e1e3a; text-align: right; white-space: nowrap; }
td:first-child { text-align: left; color: #64748b; }
tr:nth-child(even) td { background: #0d0d17; }

.tag { border-radius: 20px; padding: 2px 8px; font-weight: 700; font-size: 11px; }
.tag-blue   { background: #3B82F622; color: #3B82F6; }
.tag-green  { background: #10B98122; color: #10B981; }
.tag-yellow { background: #F59E0B22; color: #F59E0B; }
.tag-red    { background: #EF444422; color: #EF4444; }
.tag-purple { background: #8B5CF622; color: #8B5CF6; }

.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.note { text-align: center; padding: 10px; color: #64748b; font-size: 11px; }
.col-header { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
</style>
</head>
<body>

<header>
  <h1>🏢 부동산 실거래가 비교</h1>
  <p>잠실엘스 · 래미안퍼스티지 · 아크로리버파크 · 원베일리 · 메이플자이</p>
  <div class="count-badge" id="countBadge">0건</div>
</header>

<div class="filters">
  <div class="filter-group">
    <div class="filter-label">📅 조회 기간</div>
    <div class="date-row">
      <input type="date" id="startDate" value="2022-01-01">
      <span style="color:#64748b">~</span>
      <input type="date" id="endDate" value="2026-05-27">
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn" onclick="setRange(1)">1년</button>
      <button class="btn" onclick="setRange(2)">2년</button>
      <button class="btn" onclick="setRange(3)">3년</button>
      <button class="btn" onclick="setRange(5)">5년</button>
      <button class="btn" onclick="setRange(0)">전체</button>
    </div>
  </div>
  <div class="filter-group">
    <div class="filter-label">🏠 단지 선택</div>
    <div class="btn-row" id="complexBtns"></div>
  </div>
  <div class="filter-group">
    <div class="filter-label">📐 평형 선택</div>
    <div class="btn-row" id="typeBtns"></div>
  </div>
  <div class="filter-group" style="margin-bottom:0">
    <div class="filter-label">📊 표시 방식</div>
    <div class="btn-row">
      <button class="btn active" id="btnMonthly" onclick="setView(true)">월별 평균</button>
      <button class="btn" id="btnDaily" onclick="setView(false)">일별 거래</button>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('chart')">📈 추이</button>
  <button class="tab" onclick="showTab('stats')">📋 통계</button>
  <button class="tab" onclick="showTab('detail')">🔍 내역</button>
  <button class="tab" onclick="showTab('compare')">⚖️ 비교</button>
</div>

<div class="content">
  <!-- 차트 탭 -->
  <div id="panel-chart" class="panel active">
    <div class="chart-box" onclick="openModal()">
      <div class="chart-title" id="chartTitle">월별 평균 (만원)</div>
      <button class="expand-btn" onclick="openModal()">⛶</button>
      <canvas id="myChart"></canvas>
      <div class="legend">
        <span class="legend-item">——— 30평대</span>
        <span class="legend-item">- - - 20평대</span>
      </div>
    </div>
    <div class="expand-hint">📱 그래프를 탭하면 전체화면으로 확대</div>
  </div>

  <!-- 통계 탭 -->
  <div id="panel-stats" class="panel">
    <div class="overflow">
      <table id="statsTable">
        <thead><tr><th>단지</th><th>평형</th><th>건수</th><th>평균가</th><th>최저가</th><th>최고가</th><th>최근가</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- 거래내역 탭 -->
  <div id="panel-detail" class="panel">
    <div id="detailNote" class="note"></div>
    <div class="overflow" id="detailTableWrap"></div>
  </div>

  <!-- 비교 탭 -->
  <div id="panel-compare" class="panel">
    <div style="margin-bottom:14px">
      <div class="filter-label" style="margin-bottom:8px">기준(A) 선택</div>
      <div class="btn-row" id="cmpABtns"></div>
      <div class="filter-label" style="margin-bottom:8px;margin-top:12px">비교(B) 선택</div>
      <div class="btn-row" id="cmpBBtns"></div>
    </div>
    <div id="compareNote" class="note"></div>
    <div class="overflow" id="compareTableWrap"></div>
  </div>
</div>

<!-- 전체화면 모달 -->
<div id="chartModal">
  <div class="modal-header">
    <span class="modal-title" id="modalTitle">가격 추이 (전체화면)</span>
    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <canvas id="modalChart"></canvas>
    <div class="modal-legend">
      <span>——— 30평대</span>
      <span>- - - 20평대</span>
    </div>
  </div>
</div>

const COLOR_CLASS = {"잠실엘스":"tag-blue","래미안퍼스티지":"tag-green","아크로리버파크":"tag-yellow","원베일리":"tag-red","메이플자이":"tag-purple"};
const ACTIVE_CLASS = {"잠실엘스":"active-blue","래미안퍼스티지":"active-green","아크로리버파크":"active-yellow","원베일리":"active-red","메이플자이":"active-purple"};

let selComplexes = ["잠실엘스","래미안퍼스티지","아크로리버파크"];

let isMonthly = true;
let currentTab = "chart";
let myChart = null;
let modalChart = null;
const maxDate = "2026-05-27";
const minDate = "2016-01-04";

function fmt(v) {
  if (v === null || v === undefined) return "-";
  const e = Math.floor(v/10000), m = v%10000;
  return m === 0 ? e+"억" : e+"억 "+m.toLocaleString();
}

function setRange(years) {
  document.getElementById("endDate").value = maxDate;
  if (!years) { document.getElementById("startDate").value = minDate; }
  else { const y = parseInt(maxDate.slice(0,4))-years; document.getElementById("startDate").value = y+maxDate.slice(4); }
  render();
}

function setView(monthly) {
  isMonthly = monthly;
  document.getElementById("btnMonthly").className = "btn"+(monthly?" active":"");
  document.getElementById("btnDaily").className = "btn"+(!monthly?" active":"");
  document.getElementById("chartTitle").textContent = (monthly?"월별 평균":"일별 거래")+" (만원)";
  document.getElementById("modalTitle").textContent = (monthly?"월별 평균":"일별 거래")+" — 전체화면";
  render();
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.className = "tab"+(["chart","stats","detail","compare"][i]===tab?" active":"");
  });
  document.querySelectorAll(".panel").forEach(p => p.className="panel");
  document.getElementById("panel-"+tab).className="panel active";
  render();
}

document.getElementById("startDate").addEventListener("change", render);
document.getElementById("endDate").addEventListener("change", render);

function getFiltered() {
  const s = document.getElementById("startDate").value;
  const e = document.getElementById("endDate").value;
  return RAW_DATA.filter(d => d.date>=s && d.date<=e && selComplexes.includes(d.complex) && selTypes.includes(d.type));
}

function buildChartData(data) {
  const grouped = {};
  data.forEach(d => {
    const lbl = isMonthly ? d.date.slice(0,7) : d.date;
    const key = d.complex+"__"+d.type;
    if (!grouped[lbl]) grouped[lbl] = {};
    if (!grouped[lbl][key]) grouped[lbl][key] = [];
    grouped[lbl][key].push(d.price);
  });
  const labels = Object.keys(grouped).sort();
  const keys = [...new Set(data.map(d=>d.complex+"__"+d.type))];
  const datasets = keys.map(key => {
    const [complex, type] = key.split("__");
    const is30 = type.includes("30");
    return {
      label: key,
      data: labels.map(l => {
        const arr = grouped[l] && grouped[l][key];
        if (!arr) return null;
        return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
      }),
      borderColor: COLORS[complex],
      backgroundColor: COLORS[complex]+"22",
      borderWidth: is30 ? 2.5 : 1.5,
      borderDash: is30 ? [] : [5,3],
      tension: 0.3, pointRadius: 0, spanGaps: true
    };
  });
  return { labels, datasets };
}

function chartOptions(fontSize) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        labels: {
          color: "#94a3b8",
          font: { size: fontSize },
          generateLabels: chart => chart.data.datasets.map((ds,i) => {
            const [c,t] = ds.label.split("__");
            return { text: c+" "+t, fillStyle: ds.borderColor, strokeStyle: ds.borderColor, lineWidth: 2, hidden: false, index: i, datasetIndex: i, fontColor: "#94a3b8" };
          })
        }
      },
      tooltip: {
        callbacks: {
          title: items => items[0].label,
          label: item => { const [c,t]=item.dataset.label.split("__"); return c+" "+t+": "+fmt(item.raw); }
        },
        backgroundColor: "#1a1a2e", borderColor: "#2d2d5e", borderWidth: 1,
        titleColor: "#a78bfa", bodyColor: "#e2e8f0"
      }
    },
    scales: {
      x: { ticks: { color: "#94a3b8", font: { size: fontSize-1 }, maxTicksLimit: 10 }, grid: { color: "#1e1e3a" } },
      y: { ticks: { color: "#94a3b8", font: { size: fontSize-1 }, callback: v => Math.round(v/10000)+"억" }, grid: { color: "#1e1e3a" } }
    }
  };
}

function render() {
  const data = getFiltered();
  document.getElementById("countBadge").textContent = data.length.toLocaleString()+"건";
  if (currentTab==="chart") renderChart(data);
  else if (currentTab==="stats") renderStats(data);
  else if (currentTab==="detail") renderDetail(data);
  else if (currentTab==="compare") renderCompare();
}

// ── 차트 ──
function renderChart(data) {
  const { labels, datasets } = buildChartData(data);
  if (myChart) myChart.destroy();
  const canvas = document.getElementById("myChart");
  canvas.style.height = "300px";
  const ctx = canvas.getContext("2d");
  myChart = new Chart(ctx, { type:"line", data:{labels, datasets}, options: chartOptions(11) });
}

// ── 모달 전체화면 ──
function openModal() {
  document.getElementById("chartModal").classList.add("open");
  document.body.style.overflow = "hidden";
  const data = getFiltered();
  const { labels, datasets } = buildChartData(data);
  setTimeout(() => {
    if (modalChart) modalChart.destroy();
    const canvas = document.getElementById("modalChart");
    const ctx = canvas.getContext("2d");
    modalChart = new Chart(ctx, { type:"line", data:{labels, datasets}, options: chartOptions(13) });
  }, 50);
}

function closeModal() {
  document.getElementById("chartModal").classList.remove("open");
  document.body.style.overflow = "";
  if (modalChart) { modalChart.destroy(); modalChart = null; }
}

// ── 통계 ──
function renderStats(data) {
  const tbody = document.querySelector("#statsTable tbody");
  tbody.innerHTML = "";
  const stats = [];
  COMPLEXES.forEach(c => {
    TYPES.forEach(t => {
      const recs = data.filter(d=>d.complex===c&&d.type===t);
      if (!recs.length) return;
      const prices = recs.map(d=>d.price);
      const latest = [...recs].sort((a,b)=>b.date.localeCompare(a.date))[0];
      stats.push({complex:c, type:t, count:prices.length, avg:Math.round(prices.reduce((a,b)=>a+b,0)/prices.length), min:Math.min(...prices), max:Math.max(...prices), latest:latest.price});
    });
  });
  stats.sort((a,b)=>b.avg-a.avg);
  if (!stats.length) { tbody.innerHTML="<tr><td colspan=7 style='text-align:center;padding:40px;color:#64748b'>데이터 없음</td></tr>"; return; }
  stats.forEach(s => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td><span class="tag ${COLOR_CLASS[s.complex]}">${s.complex}</span></td><td style="color:#94a3b8;font-size:11px;text-align:right">${s.type}</td><td style="color:#64748b">${s.count}</td><td style="font-weight:700">${fmt(s.avg)}</td><td style="color:#10b981">${fmt(s.min)}</td><td style="color:#ef4444">${fmt(s.max)}</td><td style="font-weight:700;color:#a78bfa">${fmt(s.latest)}</td>`;
    tbody.appendChild(tr);
  });
}

// ── 거래내역: 날짜×단지 크로스 테이블 ──
function renderDetail(data) {
  const wrap = document.getElementById("detailTableWrap");
  const note = document.getElementById("detailNote");
  if (!data.length) { wrap.innerHTML="<div style='text-align:center;padding:60px;color:#64748b'>데이터 없음</div>"; note.textContent=""; return; }

  // 활성 컬럼
  const cols = [];
  selComplexes.forEach(c => {
    selTypes.forEach(t => {
      if (data.some(d=>d.complex===c&&d.type===t)) cols.push({complex:c, type:t});
    });
  });

  // 그룹화
  const grouped = {};
  data.forEach(d => {
    const lbl = isMonthly ? d.date.slice(0,7) : d.date;
    const key = d.complex+"__"+d.type;
    if (!grouped[lbl]) grouped[lbl] = {};
    if (!grouped[lbl][key]) grouped[lbl][key] = [];
    grouped[lbl][key].push(d.price);
  });

  const dateLabels = Object.keys(grouped).sort().reverse();
  const showLabels = isMonthly ? dateLabels : dateLabels.slice(0,300);

  note.textContent = isMonthly
    ? `총 ${dateLabels.length}개월`
    : (dateLabels.length > 300 ? `전체 ${dateLabels.length}일 중 최신 300일 표시` : `총 ${dateLabels.length}일`);

  let html = "<table><thead><tr><th>"+(isMonthly?"연월":"거래일")+"</th>";
  cols.forEach(col => {
    html += `<th><div class="col-header"><span class="dot" style="background:${COLORS[col.complex]}"></span>${col.complex}<br><span style="font-size:10px;color:#64748b;font-weight:400">${col.type}</span></div></th>`;
  });
  html += "</tr></thead><tbody>";

  showLabels.forEach(lbl => {
    html += `<tr><td>${lbl}</td>`;
    cols.forEach(col => {
      const key = col.complex+"__"+col.type;
      const arr = grouped[lbl] && grouped[lbl][key];
      if (!arr) {
        html += "<td style='color:#2d2d5e'>-</td>";
      } else if (isMonthly) {
        const avg = Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
        html += `<td style="font-weight:600">${fmt(avg)}</td>`;
      } else {
        html += `<td style="font-weight:600">${arr.map(p=>fmt(p)).join("<br>")}</td>`;
      }
    });
    html += "</tr>";
  });
  html += "</tbody></table>";
  wrap.innerHTML = html;
}

// ── 비교 탭 ──
let cmpA = null;
let cmpB = null;

const CMP_OPTIONS = [];
COMPLEXES.forEach(c => TYPES.forEach(t => CMP_OPTIONS.push({complex:c, type:t, key:c+"__"+t})));

function cmpLabel(opt) {
  return opt.complex + " " + (opt.type.includes("20") ? "20평" : "30평");
}

function buildCmpBtns() {
  ["A","B"].forEach(side => {
    const wrap = document.getElementById("cmp"+side+"Btns");
    wrap.innerHTML = "";
    CMP_OPTIONS.forEach(opt => {
      const sel = side==="A" ? cmpA : cmpB;
      const isActive = sel && sel.key === opt.key;
      const b = document.createElement("button");
      b.className = "btn"+(isActive ? " "+ACTIVE_CLASS[opt.complex] : "");
      b.textContent = cmpLabel(opt);
      b.onclick = () => {
        if (side==="A") cmpA = (cmpA && cmpA.key===opt.key) ? null : opt;
        else             cmpB = (cmpB && cmpB.key===opt.key) ? null : opt;
        buildCmpBtns();
        renderCompare();
      };
      wrap.appendChild(b);
    });
  });
}

function getMonthlyAvgMap(data, key) {
  const grouped = {};
  data.filter(d => d.complex+"__"+d.type === key).forEach(d => {
    const ym = d.date.slice(0,7);
    if (!grouped[ym]) grouped[ym] = [];
    grouped[ym].push(d.price);
  });
  const result = {};
  Object.entries(grouped).forEach(([ym, prices]) => {
    result[ym] = Math.round(prices.reduce((a,b)=>a+b,0)/prices.length);
  });
  return result;
}

function renderCompare() {
  const wrap = document.getElementById("compareTableWrap");
  const note = document.getElementById("compareNote");

  if (!cmpA || !cmpB) {
    wrap.innerHTML = "";
    note.textContent = "위에서 기준(A)과 비교(B) 항목을 각각 하나씩 선택하세요";
    return;
  }
  if (cmpA.key === cmpB.key) {
    wrap.innerHTML = "";
    note.textContent = "A와 B가 동일합니다. 서로 다른 항목을 선택하세요";
    return;
  }

  // 비교는 날짜 필터만 적용, 단지/평형 필터는 무시하고 전체 데이터 사용
  const s = document.getElementById("startDate").value;
  const e = document.getElementById("endDate").value;
  const dateFiltered = RAW_DATA.filter(d => d.date >= s && d.date <= e);

  const mapA = getMonthlyAvgMap(dateFiltered, cmpA.key);
  const mapB = getMonthlyAvgMap(dateFiltered, cmpB.key);
  const allMonths = [...new Set([...Object.keys(mapA), ...Object.keys(mapB)])].sort().reverse();
  const common = allMonths.filter(m => mapA[m] !== undefined && mapB[m] !== undefined);

  if (!common.length) {
    note.textContent = "두 항목의 공통 거래 월이 없습니다";
    wrap.innerHTML = ""; return;
  }

  note.textContent = `A: ${cmpLabel(cmpA)}  vs  B: ${cmpLabel(cmpB)} · 공통 ${common.length}개월`;

  let html = `<table><thead><tr>
    <th>연월</th>
    <th style="color:${COLORS[cmpA.complex]}">A · ${cmpLabel(cmpA)}</th>
    <th style="color:${COLORS[cmpB.complex]}">B · ${cmpLabel(cmpB)}</th>
    <th>차액 (A-B)</th>
    <th>상대차 ((A-B)/B)</th>
  </tr></thead><tbody>`;

  common.forEach((m, i) => {
    const a = mapA[m], b = mapB[m];
    const diff = a - b;
    const rel = (a - b) / b * 100;
    const col = diff > 0 ? "#ef4444" : diff < 0 ? "#10b981" : "#94a3b8";
    const sign = diff >= 0 ? "+" : "";
    const relStr = sign + rel.toFixed(1) + "%";
    const diffFmt = sign + fmt(Math.abs(diff));
    html += `<tr style="${i%2?"background:#0d0d17":""}">
      <td>${m}</td>
      <td style="font-weight:600">${fmt(a)}</td>
      <td style="font-weight:600">${fmt(b)}</td>
      <td style="font-weight:700;color:${col}">${diffFmt}</td>
      <td style="font-weight:700;color:${col}">${relStr}</td>
    </tr>`;
  });

  html += "</tbody></table>";
  wrap.innerHTML = html;
}

buildCmpBtns();
render();
</script>
</body>
</html>
