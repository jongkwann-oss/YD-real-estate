<!DOCTYPE html>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f1a; color: #e2e8f0; font-family: 'Malgun Gothic', sans-serif; font-size: 14px; }

header { background: linear-gradient(135deg,#1a1a3e,#0f0f1a); border-bottom: 1px solid #2d2d5e; padding: 16px; }

/* API 설정 패널 */

<script>
let RAW_DATA = [];

const COMPLEXES = ["잠실엘스","래미안퍼스티지","아크로리버파크","원베일리","메이플자이"];
const TYPES = ["20평대 (59㎡)","30평대 (84㎡)"];
const COLORS = {"잠실엘스":"#3B82F6","래미안퍼스티지":"#10B981","아크로리버파크":"#F59E0B","원베일리":"#EF4444","메이플자이":"#8B5CF6"};
const COLOR_CLASS = {"잠실엘스":"tag-blue","래미안퍼스티지":"tag-green","아크로리버파크":"tag-yellow","원베일리":"tag-red","메이플자이":"tag-purple"};
const ACTIVE_CLASS = {"잠실엘스":"active-blue","래미안퍼스티지":"active-green","아크로리버파크":"active-yellow","원베일리":"active-red","메이플자이":"active-purple"};

let selComplexes = ["잠실엘스","래미안퍼스티지","아크로리버파크"];
let selTypes = ["20평대 (59㎡)","30평대 (84㎡)"];
let isMonthly = true;
let currentTab = "chart";
let myChart = null;
let modalChart = null;
let maxDate = "";
let minDate = "";

function fmt(v) {
  if (v === null || v === undefined) return "-";
  const e = Math.floor(v/10000), m = v%10000;
  return m === 0 ? e+"억" : e+"억 "+m.toLocaleString();
}

function setRange(years) {
  if (!maxDate || !minDate) return;
  document.getElementById("endDate").value = maxDate;
  if (!years) { document.getElementById("startDate").value = minDate; }
  else { const y = parseInt(maxDate.slice(0,4))-years; document.getElementById("startDate").value = y+maxDate.slice(4); }
  render();
}

function setView(monthly) {
  isMonthly = monthly;
  document.getElementById("btnMonthly").className = "btn"+(monthly?" active":"");
  document.getElementById("btnDaily").className = "btn"+(!monthly?" active":"");
  document.getElementById("chartTitle").textContent = (monthly?"월별 평균":"일별 거래")+" (만원)";
  document.getElementById("modalTitle").textContent = (monthly?"월별 평균":"일별 거래")+" — 전체화면";
  render();
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.className = "tab"+(["chart","stats","detail","compare"][i]===tab?" active":"");
  });
  document.querySelectorAll(".panel").forEach(p => p.className="panel");
  document.getElementById("panel-"+tab).className="panel active";
  render();
}


// ═══════════════════════════════════════
// API 설정 및 데이터 로드
// ═══════════════════════════════════════
const API_URL = "https://apis.data.go.kr/1613000/RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev";
const DISTRICTS = [
  { code: "11710", name: "송파구" },   // 잠실엘스
  { code: "11650", name: "서초구" },   // 래미안퍼스티지, 아크로리버파크, 원베일리
  { code: "11680", name: "강남구" }    // 메이플자이
];
const APT_NAMES = {
  "잠실엘스": ["잠실엘스"],
  "래미안퍼스티지": ["래미안퍼스티지"],
  "아크로리버파크": ["아크로리버파크"],
  "원베일리": ["원베일리"],
  "메이플자이": ["래미안메이플자이","메이플자이"]
};

function classifyArea(area) {
  const a = parseFloat(area);
  if (a >= 55 && a < 70) return "20평대 (59㎡)";
  if (a >= 75 && a < 95) return "30평대 (84㎡)";
  return null;
}

function matchComplex(aptNm) {
  for (const [complex, names] of Object.entries(APT_NAMES)) {
    for (const n of names) {
      if (aptNm.includes(n)) return complex;
    }
  }
  return null;
}

// 연/월 선택기 초기화
(function initDateSelectors() {
  const now = new Date();
  const curY = now.getFullYear(), curM = now.getMonth() + 1;
  const startYearSel = document.getElementById("apiStartYear");
  const endYearSel = document.getElementById("apiEndYear");
  const startMonthSel = document.getElementById("apiStartMonth");
  const endMonthSel = document.getElementById("apiEndMonth");
  for (let y = curY; y >= 2016; y--) {
    startYearSel.add(new Option(y+"년", y));
    endYearSel.add(new Option(y+"년", y));
  }
  for (let m = 1; m <= 12; m++) {
    startMonthSel.add(new Option(m+"월", String(m).padStart(2,"0")));
    endMonthSel.add(new Option(m+"월", String(m).padStart(2,"0")));
  }
  // 기본값: 최근 3년
  startYearSel.value = curY - 3;
  startMonthSel.value = "01";
  endYearSel.value = curY;
  endMonthSel.value = String(curM).padStart(2,"0");
})();

function generateMonths(startY, startM, endY, endM) {
  const months = [];
  let y = parseInt(startY), m = parseInt(startM);
  const ey = parseInt(endY), em = parseInt(endM);
  while (y < ey || (y === ey && m <= em)) {
    months.push(y + String(m).padStart(2,"0"));
    m++;
    if (m > 12) { m = 1; y++; }
  }
  return months;
}

async function fetchOnePage(serviceKey, lawdCd, dealYmd) {
  const params = new URLSearchParams({
    serviceKey: serviceKey,
    LAWD_CD: lawdCd,
    DEAL_YMD: dealYmd,
    pageNo: "1",
    numOfRows: "9999"
  });
  const url = API_URL + "?" + params.toString();
  const resp = await fetch(url);
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  const text = await resp.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, "text/xml");
  const code = xml.querySelector("resultCode");
  if (!code || code.textContent !== "000") {
    const msg = xml.querySelector("resultMsg");
    throw new Error("API 오류: " + (msg ? msg.textContent : "알 수 없음"));
  }
  const items = xml.querySelectorAll("item");
  const results = [];
  items.forEach(item => {
    const aptNm = item.querySelector("aptNm")?.textContent?.trim() || "";
    const complex = matchComplex(aptNm);
    if (!complex) return;
    const area = item.querySelector("excluUseAr")?.textContent?.trim() || "0";
    const type = classifyArea(area);
    if (!type) return;
    const price = parseInt((item.querySelector("dealAmount")?.textContent || "0").replace(/,/g, "").trim());
    const year = item.querySelector("dealYear")?.textContent?.trim() || "";
    const month = (item.querySelector("dealMonth")?.textContent?.trim() || "").padStart(2,"0");
    const day = (item.querySelector("dealDay")?.textContent?.trim() || "").padStart(2,"0");
    const date = year + "-" + month + "-" + day;
    results.push({ date, type, complex, price });
  });
  return results;
}

async function fetchAllData() {
  const apiKey = document.getElementById("apiKey").value.trim();
  if (!apiKey) { alert("인증키를 입력하세요"); return; }

  const startY = document.getElementById("apiStartYear").value;
  const startM = document.getElementById("apiStartMonth").value;
  const endY = document.getElementById("apiEndYear").value;
  const endM = document.getElementById("apiEndMonth").value;
  const months = generateMonths(startY, startM, endY, endM);

  // 모든 구 × 모든 월 조합
  const tasks = [];
  months.forEach(ym => {
    DISTRICTS.forEach(d => {
      tasks.push({ lawdCd: d.code, dealYmd: ym, name: d.name });
    });
  });

  const totalTasks = tasks.length;
  let completed = 0;
  const allData = [];

  // UI
  const btn = document.getElementById("fetchBtn");
  const progressWrap = document.getElementById("progressWrap");
  const progressFill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  const status = document.getElementById("apiStatus");
  btn.disabled = true;
  btn.textContent = "⏳ 데이터 수집 중...";
  progressWrap.style.display = "block";
  status.className = "api-status loading";
  status.style.display = "block";
  status.textContent = "API 호출 중... 잠시 기다려주세요";

  const CONCURRENCY = 5;
  let idx = 0;

  async function runTask() {
    while (idx < tasks.length) {
      const task = tasks[idx++];
      try {
        const data = await fetchOnePage(apiKey, task.lawdCd, task.dealYmd);
        allData.push(...data);
      } catch (e) {
        console.warn("실패:", task.name, task.dealYmd, e.message);
      }
      completed++;
      const pct = Math.round(completed / totalTasks * 100);
      progressFill.style.width = pct + "%";
      progressText.textContent = completed + " / " + totalTasks + " (" + pct + "%) · " + allData.length + "건 수집";
    }
  }

  try {
    const workers = [];
    for (let i = 0; i < CONCURRENCY; i++) workers.push(runTask());
    await Promise.all(workers);

    // 중복 제거 (같은 날짜/단지/평형/가격)
    const seen = new Set();
    RAW_DATA = allData.filter(d => {
      const key = d.date + d.complex + d.type + d.price;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    }).sort((a,b) => b.date.localeCompare(a.date));

    if (RAW_DATA.length === 0) {
      status.className = "api-status error";
      status.textContent = "❌ 수집된 거래 데이터가 없습니다. 인증키와 기간을 확인하세요.";
      btn.disabled = false;
      btn.textContent = "🔍 실거래가 데이터 가져오기";
      return;
    }

    // 동적으로 날짜 범위 설정
    maxDate = RAW_DATA[0].date;
    minDate = RAW_DATA[RAW_DATA.length - 1].date;
    document.getElementById("startDate").value = minDate;
    document.getElementById("endDate").value = maxDate;

    // UI 전환
    document.getElementById("filtersSection").style.display = "";
    document.getElementById("tabsSection").style.display = "";
    document.getElementById("emptyState").style.display = "none";
    document.getElementById("apiPanel").classList.remove("open");

    status.className = "api-status success";
    status.textContent = "✅ " + RAW_DATA.length + "건 로드 완료 (" + minDate + " ~ " + maxDate + ")";

    // 헤더 업데이트
    document.querySelector("header p").textContent = "잠실엘스 · 래미안퍼스티지 · 아크로리버파크 · 원베일리 · 메이플자이 | API 실시간 연동";

    render();
  } catch(e) {
    status.className = "api-status error";
    status.textContent = "❌ 오류: " + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "🔍 실거래가 데이터 가져오기";
    progressWrap.style.display = "none";
  }
}

// 단지 버튼
const cbtns = document.getElementById("complexBtns");
COMPLEXES.forEach(c => {
  const b = document.createElement("button");
  b.className = "btn"+(selComplexes.includes(c)?" "+ACTIVE_CLASS[c]:"");
  b.textContent = c;
  b.onclick = () => {
    if (selComplexes.includes(c)) selComplexes = selComplexes.filter(x=>x!==c);
    else selComplexes.push(c);
    b.className = "btn"+(selComplexes.includes(c)?" "+ACTIVE_CLASS[c]:"");
    render();
  };
  cbtns.appendChild(b);
});

// 평형 버튼
const tbtns = document.getElementById("typeBtns");
TYPES.forEach(t => {
  const b = document.createElement("button");
  b.className = "btn"+(selTypes.includes(t)?" active":"");
  b.textContent = t;
  b.onclick = () => {
    if (selTypes.includes(t)) selTypes = selTypes.filter(x=>x!==t);
    else selTypes.push(t);
    b.className = "btn"+(selTypes.includes(t)?" active":"");
    render();
  };
  tbtns.appendChild(b);
});

document.getElementById("startDate").addEventListener("change", render);
document.getElementById("endDate").addEventListener("change", render);

function getFiltered() {
  const s = document.getElementById("startDate").value;
  const e = document.getElementById("endDate").value;
  return RAW_DATA.filter(d => d.date>=s && d.date<=e && selComplexes.includes(d.complex) && selTypes.includes(d.type));
}

function buildChartData(data) {
  const grouped = {};
  data.forEach(d => {
    const lbl = isMonthly ? d.date.slice(0,7) : d.date;
    const key = d.complex+"__"+d.type;
    if (!grouped[lbl]) grouped[lbl] = {};
    if (!grouped[lbl][key]) grouped[lbl][key] = [];
    grouped[lbl][key].push(d.price);
  });
  const labels = Object.keys(grouped).sort();
  const keys = [...new Set(data.map(d=>d.complex+"__"+d.type))];
  const datasets = keys.map(key => {
    const [complex, type] = key.split("__");
    const is30 = type.includes("30");
    return {
      label: key,
      data: labels.map(l => {
        const arr = grouped[l] && grouped[l][key];
        if (!arr) return null;
        return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
      }),
      borderColor: COLORS[complex],
      backgroundColor: COLORS[complex]+"22",
      borderWidth: is30 ? 2.5 : 1.5,
      borderDash: is30 ? [] : [5,3],
      tension: 0.3, pointRadius: 0, spanGaps: true
    };
  });
  return { labels, datasets };
}

function chartOptions(fontSize) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        labels: {
          color: "#94a3b8",
          font: { size: fontSize },
          generateLabels: chart => chart.data.datasets.map((ds,i) => {
            const [c,t] = ds.label.split("__");
            return { text: c+" "+t, fillStyle: ds.borderColor, strokeStyle: ds.borderColor, lineWidth: 2, hidden: false, index: i, datasetIndex: i, fontColor: "#94a3b8" };
          })
        }
      },
      tooltip: {
        callbacks: {
          title: items => items[0].label,
          label: item => { const [c,t]=item.dataset.label.split("__"); return c+" "+t+": "+fmt(item.raw); }
        },
        backgroundColor: "#1a1a2e", borderColor: "#2d2d5e", borderWidth: 1,
        titleColor: "#a78bfa", bodyColor: "#e2e8f0"
      }
    },
    scales: {
      x: { ticks: { color: "#94a3b8", font: { size: fontSize-1 }, maxTicksLimit: 10 }, grid: { color: "#1e1e3a" } },
      y: { ticks: { color: "#94a3b8", font: { size: fontSize-1 }, callback: v => Math.round(v/10000)+"억" }, grid: { color: "#1e1e3a" } }
    }
  };
}

function render() {
  const data = getFiltered();
  document.getElementById("countBadge").textContent = data.length.toLocaleString()+"건";
  if (currentTab==="chart") renderChart(data);
  else if (currentTab==="stats") renderStats(data);
  else if (currentTab==="detail") renderDetail(data);
  else if (currentTab==="compare") renderCompare();
}

// ── 차트 ──
function renderChart(data) {
  const { labels, datasets } = buildChartData(data);
  if (myChart) myChart.destroy();
  const canvas = document.getElementById("myChart");
  canvas.style.height = "300px";
  const ctx = canvas.getContext("2d");
  myChart = new Chart(ctx, { type:"line", data:{labels, datasets}, options: chartOptions(11) });
}

// ── 모달 전체화면 ──
function openModal() {
  document.getElementById("chartModal").classList.add("open");
  document.body.style.overflow = "hidden";
  const data = getFiltered();
  const { labels, datasets } = buildChartData(data);
  setTimeout(() => {
    if (modalChart) modalChart.destroy();
    const canvas = document.getElementById("modalChart");
    const ctx = canvas.getContext("2d");
    modalChart = new Chart(ctx, { type:"line", data:{labels, datasets}, options: chartOptions(13) });
  }, 50);
}

function closeModal() {
  document.getElementById("chartModal").classList.remove("open");
  document.body.style.overflow = "";
  if (modalChart) { modalChart.destroy(); modalChart = null; }
}

// ── 통계 ──
function renderStats(data) {
  const tbody = document.querySelector("#statsTable tbody");
  tbody.innerHTML = "";
  const stats = [];
  COMPLEXES.forEach(c => {
    TYPES.forEach(t => {
      const recs = data.filter(d=>d.complex===c&&d.type===t);
      if (!recs.length) return;
      const prices = recs.map(d=>d.price);
      const latest = [...recs].sort((a,b)=>b.date.localeCompare(a.date))[0];
      stats.push({complex:c, type:t, count:prices.length, avg:Math.round(prices.reduce((a,b)=>a+b,0)/prices.length), min:Math.min(...prices), max:Math.max(...prices), latest:latest.price});
    });
  });
  stats.sort((a,b)=>b.avg-a.avg);
  if (!stats.length) { tbody.innerHTML="<tr><td colspan=7 style='text-align:center;padding:40px;color:#64748b'>데이터 없음</td></tr>"; return; }
  stats.forEach(s => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td><span class="tag ${COLOR_CLASS[s.complex]}">${s.complex}</span></td><td style="color:#94a3b8;font-size:11px;text-align:right">${s.type}</td><td style="color:#64748b">${s.count}</td><td style="font-weight:700">${fmt(s.avg)}</td><td style="color:#10b981">${fmt(s.min)}</td><td style="color:#ef4444">${fmt(s.max)}</td><td style="font-weight:700;color:#a78bfa">${fmt(s.latest)}</td>`;
    tbody.appendChild(tr);
  });
}

// ── 거래내역: 날짜×단지 크로스 테이블 ──
function renderDetail(data) {
  const wrap = document.getElementById("detailTableWrap");
  const note = document.getElementById("detailNote");
  if (!data.length) { wrap.innerHTML="<div style='text-align:center;padding:60px;color:#64748b'>데이터 없음</div>"; note.textContent=""; return; }

  // 활성 컬럼
  const cols = [];
  selComplexes.forEach(c => {
    selTypes.forEach(t => {
      if (data.some(d=>d.complex===c&&d.type===t)) cols.push({complex:c, type:t});
    });
  });

  // 그룹화
  const grouped = {};
  data.forEach(d => {
    const lbl = isMonthly ? d.date.slice(0,7) : d.date;
    const key = d.complex+"__"+d.type;
    if (!grouped[lbl]) grouped[lbl] = {};
    if (!grouped[lbl][key]) grouped[lbl][key] = [];
    grouped[lbl][key].push(d.price);
  });

  const dateLabels = Object.keys(grouped).sort().reverse();
  const showLabels = isMonthly ? dateLabels : dateLabels.slice(0,300);

  note.textContent = isMonthly
    ? `총 ${dateLabels.length}개월`
    : (dateLabels.length > 300 ? `전체 ${dateLabels.length}일 중 최신 300일 표시` : `총 ${dateLabels.length}일`);

  let html = "<table><thead><tr><th>"+(isMonthly?"연월":"거래일")+"</th>";
  cols.forEach(col => {
    html += `<th><div class="col-header"><span class="dot" style="background:${COLORS[col.complex]}"></span>${col.complex}<br><span style="font-size:10px;color:#64748b;font-weight:400">${col.type}</span></div></th>`;
  });
  html += "</tr></thead><tbody>";

  showLabels.forEach(lbl => {
    html += `<tr><td>${lbl}</td>`;
    cols.forEach(col => {
      const key = col.complex+"__"+col.type;
      const arr = grouped[lbl] && grouped[lbl][key];
      if (!arr) {
        html += "<td style='color:#2d2d5e'>-</td>";
      } else if (isMonthly) {
        const avg = Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
        html += `<td style="font-weight:600">${fmt(avg)}</td>`;
      } else {
        html += `<td style="font-weight:600">${arr.map(p=>fmt(p)).join("<br>")}</td>`;
      }
    });
    html += "</tr>";
  });
  html += "</tbody></table>";
  wrap.innerHTML = html;
}

// ── 비교 탭 ──
let cmpA = null;
let cmpB = null;

const CMP_OPTIONS = [];
COMPLEXES.forEach(c => TYPES.forEach(t => CMP_OPTIONS.push({complex:c, type:t, key:c+"__"+t})));

function cmpLabel(opt) {
  return opt.complex + " " + (opt.type.includes("20") ? "20평" : "30평");
}

function buildCmpBtns() {
  ["A","B"].forEach(side => {
    const wrap = document.getElementById("cmp"+side+"Btns");
    wrap.innerHTML = "";
    CMP_OPTIONS.forEach(opt => {
      const sel = side==="A" ? cmpA : cmpB;
      const isActive = sel && sel.key === opt.key;
      const b = document.createElement("button");
      b.className = "btn"+(isActive ? " "+ACTIVE_CLASS[opt.complex] : "");
      b.textContent = cmpLabel(opt);
      b.onclick = () => {
        if (side==="A") cmpA = (cmpA && cmpA.key===opt.key) ? null : opt;
        else             cmpB = (cmpB && cmpB.key===opt.key) ? null : opt;
        buildCmpBtns();
        renderCompare();
      };
      wrap.appendChild(b);
    });
  });
}

function getMonthlyAvgMap(data, key) {
  const grouped = {};
  data.filter(d => d.complex+"__"+d.type === key).forEach(d => {
    const ym = d.date.slice(0,7);
    if (!grouped[ym]) grouped[ym] = [];
    grouped[ym].push(d.price);
  });
  const result = {};
  Object.entries(grouped).forEach(([ym, prices]) => {
    result[ym] = Math.round(prices.reduce((a,b)=>a+b,0)/prices.length);
  });
  return result;
}

function renderCompare() {
  const wrap = document.getElementById("compareTableWrap");
  const note = document.getElementById("compareNote");

  if (!cmpA || !cmpB) {
    wrap.innerHTML = "";
    note.textContent = "위에서 기준(A)과 비교(B) 항목을 각각 하나씩 선택하세요";
    return;
  }
  if (cmpA.key === cmpB.key) {
    wrap.innerHTML = "";
    note.textContent = "A와 B가 동일합니다. 서로 다른 항목을 선택하세요";
    return;
  }

  // 비교는 날짜 필터만 적용, 단지/평형 필터는 무시하고 전체 데이터 사용
  const s = document.getElementById("startDate").value;
  const e = document.getElementById("endDate").value;
  const dateFiltered = RAW_DATA.filter(d => d.date >= s && d.date <= e);

  const mapA = getMonthlyAvgMap(dateFiltered, cmpA.key);
  const mapB = getMonthlyAvgMap(dateFiltered, cmpB.key);
  const allMonths = [...new Set([...Object.keys(mapA), ...Object.keys(mapB)])].sort().reverse();
  const common = allMonths.filter(m => mapA[m] !== undefined && mapB[m] !== undefined);

  if (!common.length) {
    note.textContent = "두 항목의 공통 거래 월이 없습니다";
    wrap.innerHTML = ""; return;
  }

  note.textContent = `A: ${cmpLabel(cmpA)}  vs  B: ${cmpLabel(cmpB)} · 공통 ${common.length}개월`;

  let html = `<table><thead><tr>
    <th>연월</th>
    <th style="color:${COLORS[cmpA.complex]}">A · ${cmpLabel(cmpA)}</th>
    <th style="color:${COLORS[cmpB.complex]}">B · ${cmpLabel(cmpB)}</th>
    <th>차액 (A-B)</th>
    <th>상대차 ((A-B)/B)</th>
  </tr></thead><tbody>`;

  common.forEach((m, i) => {
    const a = mapA[m], b = mapB[m];
    const diff = a - b;
    const rel = (a - b) / b * 100;
    const col = diff > 0 ? "#ef4444" : diff < 0 ? "#10b981" : "#94a3b8";
    const sign = diff >= 0 ? "+" : "";
    const relStr = sign + rel.toFixed(1) + "%";
    const diffFmt = sign + fmt(Math.abs(diff));
    html += `<tr style="${i%2?"background:#0d0d17":""}">
      <td>${m}</td>
      <td style="font-weight:600">${fmt(a)}</td>
      <td style="font-weight:600">${fmt(b)}</td>
      <td style="font-weight:700;color:${col}">${diffFmt}</td>
      <td style="font-weight:700;color:${col}">${relStr}</td>
    </tr>`;
  });

  html += "</tbody></table>";
  wrap.innerHTML = html;
}

buildCmpBtns();
if (RAW_DATA.length > 0) render();

// 페이지 로드 시 자동으로 데이터 가져오기
window.addEventListener("DOMContentLoaded", () => {
  if (document.getElementById("apiKey").value.trim()) {
    fetchAllData();
  }
});
</script>
